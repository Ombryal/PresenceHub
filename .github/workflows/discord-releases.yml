name: Release to Discord

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send release message
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          TITLE="${{ github.event.release.name || github.event.release.tag_name }}"
          URL="${{ github.event.release.html_url }}"
          CONTENT="🚀 **${TITLE}**\n🔗 ${URL}"

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$CONTENT" '{username: "GitHub Releases", content: $content}')" \
            "$WEBHOOK"
