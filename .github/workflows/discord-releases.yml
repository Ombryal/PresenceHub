name: Github Releases

on:
  release:
    types:
      - published

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Format Release Message
        env:
          EVENT_PATH: ${{ github.event_path }}
        run: |
          python3 <<'PY'
          import json
          import os
          import pathlib
          import re

          try:
              with open(os.environ["EVENT_PATH"], "r", encoding="utf-8") as f:
                  data = json.load(f)
          except Exception as e:
              print(f"Failed to read event file: {e}")
              raise

          release = data["release"]
          repo = data["repository"]["full_name"]

          title = release.get("name") or release.get("tag_name")
          tag = release.get("tag_name")
          body = release.get("body") or ""
          url = release.get("html_url")
          assets = release.get("assets", [])

          # ------------------------------------------------------------------
          # Robust section parser – handles all heading variations
          # ------------------------------------------------------------------
          def get_section(heading_pattern, next_section_patterns=None):
              """Extract text between a heading and the next heading(s)."""
              # Build regex for the main heading: e.g. "✨ What's New", "Whats New", etc.
              # The pattern is case‑insensitive and allows optional emoji/whitespace.
              match = re.search(heading_pattern, body, re.IGNORECASE)
              if not match:
                  return ""

              start = match.end()
              remaining = body[start:]

              # Find earliest occurrence of any next section heading
              end = len(remaining)
              if next_section_patterns:
                  for pat in next_section_patterns:
                      m = re.search(pat, remaining, re.IGNORECASE)
                      if m and m.start() < end:
                          end = m.start()

              section = remaining[:end].strip()
              return section

          # Patterns that match the common variations:
          whats_new_pat = r'(?:✨\s*)?what\'?s?\s*new'
          improvements_pat = r'(?:🛠\s*)?improvements'
          fixes_pat = r'(?:🐛\s*)?fixes'

          whats_new = get_section(whats_new_pat, [improvements_pat, fixes_pat])
          improvements = get_section(improvements_pat, [fixes_pat])
          fixes = get_section(fixes_pat, [])

          # Build message
          message_lines = []
          message_lines.append(f"🚀 **{title}**")
          message_lines.append("")
          message_lines.append(f"📦 Version: `{tag}`")
          message_lines.append(f"📁 Repository: `{repo}`")
          message_lines.append("")
          message_lines.append("━━━━━━━━━━━━━━━━━━━━")

          if whats_new:
              message_lines.append("")
              message_lines.append("✨ **What's New**")
              message_lines.append("")
              message_lines.append(whats_new)

          if improvements:
              message_lines.append("")
              message_lines.append("━━━━━━━━━━━━━━━━━━━━")
              message_lines.append("")
              message_lines.append("🛠 **Improvements**")
              message_lines.append("")
              message_lines.append(improvements)

          if fixes:
              message_lines.append("")
              message_lines.append("━━━━━━━━━━━━━━━━━━━━")
              message_lines.append("")
              message_lines.append("🐛 **Fixes**")
              message_lines.append("")
              message_lines.append(fixes)

          message_lines.append("")
          message_lines.append("━━━━━━━━━━━━━━━━━━━━")
          message_lines.append("")
          message_lines.append("📥 **Downloads**")
          message_lines.append("")

          def label(filename):
              name = filename.lower()
              if name.endswith(".apk"):
                  if "arm64" in name:
                      return "📱 Download APK (Arm64)"
                  if "armeabi" in name or "armeabi-v7a" in name:
                      return "📱 Download APK (Armeabi-v7a)"
                  if "universal" in name:
                      return "📱 Download APK (Universal)"
                  return "📱 Download APK"
              if ".exe" in name or "installer" in name:
                  return "🪟 Download Windows Installer"
              if "linux" in name and (".zip" in name or ".tar" in name):
                  return "🐧 Download Linux"
              if ".ipa" in name:
                  return "📱 Download iOS IPA"
              if ".dmg" in name or "macos" in name or ".pkg" in name:
                  return "🍎 Download macOS"
              # Fallback – keep generic so nothing is lost
              return f"📎 {filename}"

          for asset in assets:
              asset_name = asset["name"]
              link = asset["browser_download_url"]
              dl_label = label(asset_name)
              message_lines.append(dl_label)
              message_lines.append(link)
              message_lines.append("")

          message_lines.append("━━━━━━━━━━━━━━━━━━━━")
          message_lines.append("")
          message_lines.append(f"🔗 Full Release:")
          message_lines.append(url)

          full_message = "\n".join(message_lines)

          # Save to file for the next step
          pathlib.Path("discord_message.txt").write_text(full_message, encoding="utf-8")
          print("Message file written successfully.")
          PY

      - name: Send To Discord
        env:
          WEBHOOK: ${{ secrets.RELEASE_WEBHOOK }}
        run: |
          python3 <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          webhook_url = os.environ.get("WEBHOOK")
          if not webhook_url:
              raise ValueError("WEBHOOK secret not set")

          msg_file = pathlib.Path("discord_message.txt")
          if not msg_file.exists():
              raise FileNotFoundError("discord_message.txt not found")

          content = msg_file.read_text(encoding="utf-8")
          print(f"Message length: {len(content)} characters")

          # Discord limit is 2000 characters. Split if needed.
          MAX_LEN = 2000

          def send_chunk(chunk):
              payload = {
                  "username": "Github Releases",
                  "content": chunk
              }
              data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  webhook_url,
                  data=data,
                  headers={
                      "Content-Type": "application/json"
                  }
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"Sent chunk ({len(chunk)} chars), status: {resp.status}")
              except Exception as e:
                  print(f"Failed to send chunk: {e}")
                  raise

          # Simple split: keep lines intact, group up to MAX_LEN
          lines = content.splitlines(keepends=True)
          current_chunk = ""
          for line in lines:
              if len(current_chunk) + len(line) > MAX_LEN:
                  send_chunk(current_chunk.rstrip())
                  current_chunk = line
              else:
                  current_chunk += line
          if current_chunk.strip():
              send_chunk(current_chunk.rstrip())

          print("All chunks sent.")
          PY
