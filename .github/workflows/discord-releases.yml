name: Github Releases

on:
  release:
    types:
      - published

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Format Release Message
        env:
          EVENT_PATH: ${{ github.event_path }}
        run: |
          python3 <<'PY'
          import json
          import os
          import pathlib
          from datetime import datetime

          with open(os.environ["EVENT_PATH"], "r", encoding="utf-8") as f:
              data = json.load(f)

          release = data["release"]

          title = release.get("name") or release.get("tag_name")
          tag = release.get("tag_name")
          body = release.get("body") or ""
          repo = data["repository"]["full_name"]
          url = release.get("html_url")

          assets = release.get("assets", [])

          def clean_section(text):
              return text.strip()

          def get_section(name, next_sections):
              start = body.lower().find(name.lower())

              if start == -1:
                  return ""

              content = body[start + len(name):]

              end = len(content)

              for section in next_sections:
                  pos = content.lower().find(section.lower())
                  if pos != -1:
                      end = min(end, pos)

              return clean_section(content[:end])

          whats_new = get_section(
              "✨ What's New",
              ["🛠 Improvements", "🐛 Fixes"]
          )

          improvements = get_section(
              "🛠 Improvements",
              ["🐛 Fixes"]
          )

          fixes = get_section(
              "🐛 Fixes",
              []
          )

          message = []

          message.append(f"🚀 **{title}**")
          message.append("")
          message.append(f"📦 Version: `{tag}`")
          message.append(f"📁 Repository: `{repo}`")
          message.append("")

          message.append("━━━━━━━━━━━━━━━━━━━━")

          if whats_new:
              message.append("")
              message.append("✨ **What's New**")
              message.append("")
              message.append(whats_new)

          if improvements:
              message.append("")
              message.append("━━━━━━━━━━━━━━━━━━━━")
              message.append("")
              message.append("🛠 **Improvements**")
              message.append("")
              message.append(improvements)

          if fixes:
              message.append("")
              message.append("━━━━━━━━━━━━━━━━━━━━")
              message.append("")
              message.append("🐛 **Fixes**")
              message.append("")
              message.append(fixes)

          message.append("")
          message.append("━━━━━━━━━━━━━━━━━━━━")
          message.append("")
          message.append("📥 **Downloads**")
          message.append("")

          def label(asset):
              name = asset.lower()

              if name.endswith(".apk"):
                  if "arm64" in name:
                      return "📱 Download APK (Arm64)"
                  if "armeabi" in name:
                      return "📱 Download APK (Armeabi-v7a)"
                  if "universal" in name:
                      return "📱 Download APK (Universal)"
                  return "📱 Download APK"

              if ".exe" in name or "installer" in name:
                  return "🪟 Download Windows Installer"

              if "linux" in name and ".zip" in name:
                  return "🐧 Download Linux ZIP"

              if ".ipa" in name:
                  return "📱 Download iOS IPA"

              if ".dmg" in name or "macos" in name:
                  return "🍎 Download macOS"

              return None

          for asset in assets:
              name = asset["name"]
              link = asset["browser_download_url"]

              download_name = label(name)

              if download_name:
                  message.append(f"{download_name}")
                  message.append(link)
                  message.append("")

          message.append("━━━━━━━━━━━━━━━━━━━━")
          message.append("")
          message.append(f"🔗 Full Release:")
          message.append(url)

          pathlib.Path("discord_message.txt").write_text(
              "\n".join(message),
              encoding="utf-8"
          )

          PY

      - name: Send To Discord
        env:
          WEBHOOK: ${{ secrets.RELEASE_WEBHOOK }}
        run: |
          python3 <<'PY'
          import json
          import pathlib
          import urllib.request

          content = pathlib.Path(
              "discord_message.txt"
          ).read_text(encoding="utf-8")

          payload = {
              "username": "Github Releases",
              "content": content
          }

          request = urllib.request.Request(
              "${WEBHOOK}",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json"
              }
          )

          urllib.request.urlopen(request)

          PY
