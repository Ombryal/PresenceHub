name: Discord GitHub Updates

on:
  push:
  issues:
    types: [opened, closed, reopened]
  issue_comment:
  pull_request:
    types: [opened, closed, reopened, synchronize]
  pull_request_review:
    types: [submitted]

jobs:
  discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |

          if [ "$EVENT" = "push" ]; then

          TITLE="${REPO}:$GITHUB_REF_NAME"
          MESSAGE="${{ github.event.commits[0].message }} - $ACTOR"

          elif [ "$EVENT" = "issues" ]; then

          TITLE="${REPO}] Issue ${{ github.event.action }}: #${{ github.event.issue.number }} ${{ github.event.issue.title }}"
          MESSAGE="${{ github.event.issue.body }}"

          elif [ "$EVENT" = "issue_comment" ]; then

          TITLE="${REPO}] New issue comment by $ACTOR"
          MESSAGE="${{ github.event.comment.body }}"

          elif [ "$EVENT" = "pull_request" ]; then

          TITLE="${REPO}] Pull request ${{ github.event.action }}: #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}"
          MESSAGE="${{ github.event.pull_request.body }}"

          elif [ "$EVENT" = "pull_request_review" ]; then

          TITLE="${REPO}] Pull request review submitted"
          MESSAGE="${{ github.event.review.body }}"

          fi


          curl \
          -H "Content-Type: application/json" \
          -d "{
            \"username\":\"GitHub\",
            \"embeds\":[{
              \"author\":{
                \"name\":\"$ACTOR\"
              },
              \"title\":\"[$TITLE]\",
              \"description\":\"$MESSAGE\",
              \"footer\":{
                \"text\":\"$REPO\"
              }
            }]
          }" \
          $WEBHOOK
